<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Битва Героев</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --mortal-red: #c1121f;
            --dark-bg: #0b090a;
            --gold: #fdf0d5;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }

        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            z-index: 10;
        }

        #menu-screen {
            display: flex;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), 
            url('https://sun9-71.userapi.com/s/v1/ig2/POmRpj44WUzj14uLa-NtzW9oDwDWFFu1AuQXESuPTbWIekL0i5aWkuOhcHqtx4uw7PyTvXBEooeTjIgCfMhenGpJ.jpg?quality=95&as=32x18,48x27,72x40,108x60,160x89,240x134,360x201,480x268,540x301,640x357,720x402,1080x603,1280x714,1376x768&from=bu&u=Lcp1j6ycdHkPclgCks3hZqJE1w299_dUvH6M-nzkpvs&cs=1376x0');
        }

        .title {
            font-size: 55px; font-weight: 900; color: var(--mortal-red);
            text-shadow: 2px 2px 0px #fff, 0 0 20px var(--mortal-red);
            text-transform: uppercase; margin-bottom: 40px; letter-spacing: 2px; text-align: center;
        }

        .btn {
            background: rgba(193, 18, 31, 0.8); color: white; border: 2px solid var(--mortal-red);
            padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 5px;
            cursor: pointer; margin: 10px; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(193, 18, 31, 0.5); transition: 0.2s; backdrop-filter: blur(5px);
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary { background: transparent; color: var(--gold); border: 2px solid var(--gold); box-shadow: none; }

        h2 { color: var(--gold); text-transform: uppercase; text-shadow: 0 0 10px black; }

        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 95%; margin-bottom: 20px; }
        .char-card { width: 70px; height: 70px; border: 2px solid #555; background-size: cover; background-position: center; cursor: pointer; filter: grayscale(50%); transition: 0.3s; }
        .char-card.active { border: 3px solid var(--mortal-red); filter: grayscale(0%); transform: scale(1.1); box-shadow: 0 0 15px var(--mortal-red); z-index: 2; }
        #selected-char-name { font-size: 24px; font-weight: bold; color: white; height: 30px; margin-bottom: 15px; text-transform: uppercase; text-align: center;}

        .map-grid { display: flex; flex-direction: column; gap: 15px; width: 80%; }
        .map-card { height: 80px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; text-shadow: 1px 1px 3px black; background-size: cover; background-position: center; cursor: pointer; position: relative; }
        .map-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .map-card span { position: relative; z-index: 2; }
        .map-card.active { border-color: var(--gold); }
        .map-card.active::before { background: rgba(0,0,0,0.2); }

        /* Игровой интерфейс */
        #game-screen { background-color: black; } 
        
        #hud {
            position: absolute; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 10px 20px; box-sizing: border-box; z-index: 20;
            background: linear-gradient(rgba(0,0,0,0.8), transparent);
        }

        .player-info { display: flex; flex-direction: column; }
        .player-info.right { align-items: flex-end; }
        .name { font-size: 18px; font-weight: bold; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; text-shadow: 1px 1px 2px black;}
        
        .hearts { display: flex; gap: 5px; }
        .heart { font-size: 20px; color: #555; } 
        .heart.full { color: var(--mortal-red); text-shadow: 0 0 5px red;}

        .fatality-bar { width: 150px; height: 8px; background: #333; margin-top: 5px; border: 1px solid #000; }
        .fatality-fill { width: 0%; height: 100%; background: #00d2ff; transition: width 0.3s; }

        .timer-box { text-align: center; }
        .timer { font-size: 40px; font-weight: 900; color: white; text-shadow: 0 0 10px var(--mortal-red); }
        .round { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: bold;}

        #fight-canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen">
        <div class="title">Битва Героев</div>
        <button class="btn" onclick="showScreen('diff-screen')">Начать бой</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html?show=games'">Назад в меню</button>
    </div>

    <div id="diff-screen" class="screen" style="background: var(--dark-bg);">
        <h2>Сложность ИИ</h2>
        <button class="btn" onclick="setDifficulty('easy')">Легкий</button>
        <button class="btn" onclick="setDifficulty('medium')">Средний</button>
        <button class="btn" onclick="setDifficulty('hard')">Сложный</button>
        <button class="btn btn-secondary" onclick="showScreen('menu-screen')" style="margin-top: 30px;">Назад</button>
    </div>

    <div id="char-screen" class="screen" style="background: var(--dark-bg);">
        <h2>Ваш боец</h2>
        <div id="selected-char-name">Железный человек</div>
        <div class="char-grid">
            <div class="char-card active" onclick="selectChar(this, 'Железный человек')" style="background-image: url('https://sun9-69.userapi.com/s/v1/ig2/Hh_oprR6Z3Pv9v0tzbn0E030aRuB-ko5ajRK5insZcOPzckILMQLPSYhJI5zGMgm7tzwZRGQ4dziZxJ7ppCh9sCy.jpg?quality=95&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360,480x480,540x540,640x640,720x720,937x937&from=bu&u=0vp13m8is07OlGZlM734nKC0TNSQ9y_WrIBc93BwxCQ&cs=937x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Супермен')" style="background-image: url('https://sun9-40.userapi.com/s/v1/ig2/PJPl0be_XrRFDF3kES5FhTy9Y0QVVn3LZf9oVcAYSiO5vCSxWFOUCoXR_seRrIoZj4OJtROj0YsA8WITjPXyeb3p.jpg?quality=95&as=32x41,48x62,72x92,108x139,160x205,240x308,360x462,480x616,540x693,542x696&from=bu&u=sEuoaQ0-2bxkVSnoPD5zR9KzYHGiL9lI8eA929y5Idg&cs=542x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Бэтмен')" style="background-image: url('https://sun9-69.userapi.com/s/v1/ig2/Aw_s8HFVhnzn3hkVV73QEA9WDqiYq16OVuvQL2hgOnhhQaMtzlNmrrBLT3-bSjM9Ca8tsP7wSF4MICxfRbC0ZEos.jpg?quality=95&as=32x49,48x74,72x110,108x166,160x245,240x368,360x552,480x736,536x822&from=bu&u=6G-FrJrpFNdxF-9TwTUENKXk-6KYx6VBa1H0X3G6xeg&cs=536x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Капитан Америка')" style="background-image: url('https://sun9-12.userapi.com/s/v1/ig2/tvmGk0j2KtB__2HJkWI7ESyVBAZeIBSvNUzILLJpIZaPYt32LeeffLMA8czjpvwRHeyFwPEcLWZwICIOsTbLeFAP.jpg?quality=95&as=32x48,48x72,72x108,108x162,160x241,240x361,360x541,480x722,540x812,640x962,720x1083,1064x1600&from=bu&u=udipUuD0USLmtMN_qPOc4ZRXgaJJRgaQM4yLT8xnGNE&cs=1064x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Халк')" style="background-image: url('https://sun9-68.userapi.com/s/v1/ig2/J5aLWST6NQiEbIQe1no7Ad84W3YG4F_PDztKHBA7QjQAGc32phYqhKopQMFabgGLJd7Xz8ynushD1jgxa_SAb-FI.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720&from=bu&u=6JVIqaBzTABB2-bMUI0glMbYv3GOcuROUftb8diZjTc&cs=1280x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Тор')" style="background-image: url('https://sun9-12.userapi.com/s/v1/ig2/4TIxfJABSrE_GmkiVio3P6QLCzN7T3mlhGdw43BcRgeSyEDbqdNqd0Xjn7ZzF3q6k1zj1W0vcijSn2B6IvCejIPK.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720&from=bu&u=AA5Foquj99uQn-lDPBdjstIBOIbvWhZn8E430KJE0f4&cs=1280x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Чужой')" style="background-image: url('https://sun9-80.userapi.com/s/v1/ig2/dpCLRgZaYCfo8O3b1vw0s9hs6c3QC7njXYpLl2yjCEW-G0sUutwLXkMkZmNmU_DwbAlW2z4yhuqHvmHgFBcw7jW2.jpg?quality=95&as=32x32,48x48,72x71,108x107,160x158,240x238,360x357,480x475,540x535,640x634,720x713,735x728&from=bu&u=7Xopi4op2y4DH5Tdkn9TruUAxjxFqeUp1gyeozguSNU&cs=735x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Хищник')" style="background-image: url('https://sun9-38.userapi.com/s/v1/ig2/z-mlPZNl6aay5oSt6sY5G-vPK7UQauaKHKRH6TVLQ8SX7wX8U1HelVYghPvf2RYHLoi12uE6i7fiLx27zzg88nfl.jpg?quality=95&as=32x17,48x26,72x38,108x58,160x85,240x128,360x192,480x256,540x288,640x341,720x384,1080x576,1280x683,1440x768,1920x1024&from=bu&u=qQl0CGh3Ikv0FnXrVyFALCPFZC82sWemXEXITmcOt4Q&cs=1920x0');"></div>
        </div>
        <button class="btn" onclick="showScreen('map-screen')">Далее</button>
    </div>

    <div id="map-screen" class="screen" style="background: var(--dark-bg);">
        <h2>Выбор Арены</h2>
        <div class="map-grid">
            <div class="map-card active" onclick="selectMap(this, 'city')" style="background-image: url('https://sun9-6.userapi.com/s/v1/ig2/qRwHP2OtILVf2rZTlGmsA7aUw-Ew67BGQyUMZEkBY7CqCrpOmD6_zf4_r98EfzHrz0m211K96FVf1DDvdDuUdaKO.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=joYKwBr43AZp3c-kO48ixoiXel7gTK6knrtqyhe2vNQ&cs=1408x0');">
                <span>Разрушенный город</span>
            </div>
            <div class="map-card" onclick="selectMap(this, 'ice')" style="background-image: url('https://sun9-57.userapi.com/s/v1/ig2/By5YJ-p0aG8QfZlfEdte91rWVtcH-ds9b78EJxQoynWwo9cU78DCT0KLUha_9kyB5hTFgoz8DlJa7yJCV-GSYERZ.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=gxttBCJPgyD3nnyt_GFKzmjsRXMZLJluYSIX2ZDhPCs&cs=1408x0');">
                <span>Ледяной мир</span>
            </div>
            <div class="map-card" onclick="selectMap(this, 'end')" style="background-image: url('https://sun9-80.userapi.com/s/v1/ig2/W-usTkJ9s9LBqOI_hJZvHtN4BzKIlF9tjSOG0dKTXu-fdfC-NNl3LXW4HInEAalcDgvEEEP3XQeWR0THlDsg4Nr4.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=gj3rMmIA2duTO9gFlgRR0qSUCA0AKeWJ0yRLMatAtOM&cs=1408x0');">
                <span>Конец жизни</span>
            </div>
        </div>
        <button class="btn" style="margin-top: 20px;" onclick="initGame()">В БОЙ!</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="player-info">
                <div class="name" id="p1-name">Железный человек</div>
                <div class="hearts" id="p1-hearts"></div>
                <div class="fatality-bar"><div class="fatality-fill" id="p1-fatality"></div></div>
            </div>
            
            <div class="timer-box">
                <div class="timer" id="round-timer">90</div>
                <div class="round" id="round-counter">Раунд 1</div>
            </div>

            <div class="player-info right">
                <div class="name" id="p2-name">Противник</div>
                <div class="hearts" id="p2-hearts"></div>
                <div class="fatality-bar"><div class="fatality-fill"></div></div>
            </div>
        </div>
        <canvas id="fight-canvas"></canvas>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let gameSettings = { difficulty: 'easy', character: 'Железный человек', map: 'city' };

        // База данных героев с ссылками на картинки
        const heroData = {
            'Железный человек': 'https://sun9-69.userapi.com/s/v1/ig2/Hh_oprR6Z3Pv9v0tzbn0E030aRuB-ko5ajRK5insZcOPzckILMQLPSYhJI5zGMgm7tzwZRGQ4dziZxJ7ppCh9sCy.jpg?quality=95&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360,480x480,540x540,640x640,720x720,937x937&from=bu&u=0vp13m8is07OlGZlM734nKC0TNSQ9y_WrIBc93BwxCQ&cs=937x0',
            'Супермен': 'https://sun9-40.userapi.com/s/v1/ig2/PJPl0be_XrRFDF3kES5FhTy9Y0QVVn3LZf9oVcAYSiO5vCSxWFOUCoXR_seRrIoZj4OJtROj0YsA8WITjPXyeb3p.jpg?quality=95&as=32x41,48x62,72x92,108x139,160x205,240x308,360x462,480x616,540x693,542x696&from=bu&u=sEuoaQ0-2bxkVSnoPD5zR9KzYHGiL9lI8eA929y5Idg&cs=542x0',
            'Бэтмен': 'https://sun9-69.userapi.com/s/v1/ig2/Aw_s8HFVhnzn3hkVV73QEA9WDqiYq16OVuvQL2hgOnhhQaMtzlNmrrBLT3-bSjM9Ca8tsP7wSF4MICxfRbC0ZEos.jpg?quality=95&as=32x49,48x74,72x110,108x166,160x245,240x368,360x552,480x736,536x822&from=bu&u=6G-FrJrpFNdxF-9TwTUENKXk-6KYx6VBa1H0X3G6xeg&cs=536x0',
            'Капитан Америка': 'https://sun9-12.userapi.com/s/v1/ig2/tvmGk0j2KtB__2HJkWI7ESyVBAZeIBSvNUzILLJpIZaPYt32LeeffLMA8czjpvwRHeyFwPEcLWZwICIOsTbLeFAP.jpg?quality=95&as=32x48,48x72,72x108,108x162,160x241,240x361,360x541,480x722,540x812,640x962,720x1083,1064x1600&from=bu&u=udipUuD0USLmtMN_qPOc4ZRXgaJJRgaQM4yLT8xnGNE&cs=1064x0',
            'Халк': 'https://sun9-68.userapi.com/s/v1/ig2/J5aLWST6NQiEbIQe1no7Ad84W3YG4F_PDztKHBA7QjQAGc32phYqhKopQMFabgGLJd7Xz8ynushD1jgxa_SAb-FI.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720&from=bu&u=6JVIqaBzTABB2-bMUI0glMbYv3GOcuROUftb8diZjTc&cs=1280x0',
            'Тор': 'https://sun9-12.userapi.com/s/v1/ig2/4TIxfJABSrE_GmkiVio3P6QLCzN7T3mlhGdw43BcRgeSyEDbqdNqd0Xjn7ZzF3q6k1zj1W0vcijSn2B6IvCejIPK.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720&from=bu&u=AA5Foquj99uQn-lDPBdjstIBOIbvWhZn8E430KJE0f4&cs=1280x0',
            'Чужой': 'https://sun9-80.userapi.com/s/v1/ig2/dpCLRgZaYCfo8O3b1vw0s9hs6c3QC7njXYpLl2yjCEW-G0sUutwLXkMkZmNmU_DwbAlW2z4yhuqHvmHgFBcw7jW2.jpg?quality=95&as=32x32,48x48,72x71,108x107,160x158,240x238,360x357,480x475,540x535,640x634,720x713,735x728&from=bu&u=7Xopi4op2y4DH5Tdkn9TruUAxjxFqeUp1gyeozguSNU&cs=735x0',
            'Хищник': 'https://sun9-38.userapi.com/s/v1/ig2/z-mlPZNl6aay5oSt6sY5G-vPK7UQauaKHKRH6TVLQ8SX7wX8U1HelVYghPvf2RYHLoi12uE6i7fiLx27zzg88nfl.jpg?quality=95&as=32x17,48x26,72x38,108x58,160x85,240x128,360x192,480x256,540x288,640x341,720x384,1080x576,1280x683,1440x768,1920x1024&from=bu&u=qQl0CGh3Ikv0FnXrVyFALCPFZC82sWemXEXITmcOt4Q&cs=1920x0'
        };

        // База данных фонов
        const mapData = {
            'city': 'https://sun9-6.userapi.com/s/v1/ig2/qRwHP2OtILVf2rZTlGmsA7aUw-Ew67BGQyUMZEkBY7CqCrpOmD6_zf4_r98EfzHrz0m211K96FVf1DDvdDuUdaKO.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=joYKwBr43AZp3c-kO48ixoiXel7gTK6knrtqyhe2vNQ&cs=1408x0',
            'ice': 'https://sun9-57.userapi.com/s/v1/ig2/By5YJ-p0aG8QfZlfEdte91rWVtcH-ds9b78EJxQoynWwo9cU78DCT0KLUha_9kyB5hTFgoz8DlJa7yJCV-GSYERZ.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=gxttBCJPgyD3nnyt_GFKzmjsRXMZLJluYSIX2ZDhPCs&cs=1408x0',
            'end': 'https://sun9-80.userapi.com/s/v1/ig2/W-usTkJ9s9LBqOI_hJZvHtN4BzKIlF9tjSOG0dKTXu-fdfC-NNl3LXW4HInEAalcDgvEEEP3XQeWR0THlDsg4Nr4.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=gj3rMmIA2duTO9gFlgRR0qSUCA0AKeWJ0yRLMatAtOM&cs=1408x0'
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        function setDifficulty(d) { gameSettings.difficulty = d; showScreen('char-screen'); }

        function selectChar(element, name) {
            gameSettings.character = name;
            document.getElementById('selected-char-name').innerText = name;
            document.querySelectorAll('.char-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
        }

        function selectMap(element, mapId) {
            gameSettings.map = mapId;
            document.querySelectorAll('.map-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
        }

        showScreen('menu-screen');

        // --- ДВИЖОК ФАЙТИНГА ---

        const canvas = document.getElementById('fight-canvas');
        const ctx = canvas.getContext('2d');
        let animationId;
        let keys = {};
        
        // Загрузка фонового изображения
        let currentBgImg = new Image();

        canvas.addEventListener('contextmenu', event => event.preventDefault());

        class Fighter {
            constructor(x, heroName, isPlayer) {
                this.x = x;
                this.y = 0; 
                this.width = 90;   // Размер персонажа (аватарки)
                this.height = 140; 
                this.heroName = heroName;
                this.isPlayer = isPlayer;
                
                // Загрузка изображения героя
                this.img = new Image();
                this.img.src = heroData[heroName];

                this.vx = 0;
                this.vy = 0;
                this.speed = 5;
                this.jumpPower = -15;
                this.gravity = 0.8;
                this.grounded = false;
                
                this.hp = 5;
                this.isAttacking = false;
                this.attackType = null; 
                this.attackTimer = 0;
                
                this.facingRight = isPlayer; 
            }

            update(groundY) {
                this.vy += this.gravity;
                this.y += this.vy;
                this.x += this.vx;

                if (this.y + this.height >= groundY) {
                    this.y = groundY - this.height;
                    this.vy = 0;
                    this.grounded = true;
                }

                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

                if (this.isAttacking) {
                    this.attackTimer--;
                    if (this.attackTimer <= 0) {
                        this.isAttacking = false;
                        this.attackType = null;
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                
                // Смещаем центр для вращения и отражения
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                
                // Разворачиваем картинку, если смотрит влево
                if (!this.facingRight) {
                    ctx.scale(-1, 1);
                }

                // Анимация удара: Картинка резко наклоняется вперед
                if (this.isAttacking) {
                    ctx.rotate(this.attackType === 'punch' ? 0.3 : 0.5);
                }

                // Рисуем картинку героя, добавляем красную рамку для врага, синюю для игрока
                ctx.strokeStyle = this.isPlayer ? "#00d2ff" : "#c1121f";
                ctx.lineWidth = 4;
                
                if (this.img.complete) {
                    ctx.drawImage(this.img, -this.width / 2, -this.height / 2, this.width, this.height);
                    ctx.strokeRect(-this.width / 2, -this.height / 2, this.width, this.height);
                } else {
                    ctx.fillStyle = this.isPlayer ? "blue" : "red";
                    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                }

                // Рисуем визуальный эффект удара (вспышка впереди картинки)
                if (this.isAttacking) {
                    ctx.fillStyle = this.attackType === 'punch' ? "rgba(255, 204, 0, 0.8)" : "rgba(255, 69, 0, 0.8)";
                    ctx.beginPath();
                    let hitX = this.attackType === 'punch' ? this.width/2 + 20 : this.width/2 + 40;
                    let hitY = this.attackType === 'punch' ? -20 : 30;
                    ctx.arc(hitX, hitY, 15, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            attack(type) {
                if (!this.isAttacking) {
                    this.isAttacking = true;
                    this.attackType = type;
                    this.attackTimer = type === 'punch' ? 12 : 20; 
                }
            }

            getAttackBox() {
                let box = { w: 0, h: 0, x: 0, y: 0 };
                if (this.attackType === 'punch') {
                    box.w = 50; box.h = 40;
                    box.x = this.facingRight ? this.x + this.width : this.x - box.w;
                    box.y = this.y + 20; 
                } else if (this.attackType === 'kick') {
                    box.w = 70; box.h = 40; 
                    box.x = this.facingRight ? this.x + this.width : this.x - box.w;
                    box.y = this.y + 70; 
                }
                return box;
            }

            // ЛОГИКА ИИ (Бота)
            aiThink(enemy) {
                if (this.isPlayer) return;

                let dist = enemy.x - this.x;
                let absDist = Math.abs(dist);

                // Настройки сложности
                let moveChance, attackRange, attackChance;
                if (gameSettings.difficulty === 'easy') {
                    moveChance = 0.4; attackRange = 60; attackChance = 0.02;
                } else if (gameSettings.difficulty === 'medium') {
                    moveChance = 0.7; attackRange = 70; attackChance = 0.05;
                } else {
                    moveChance = 0.9; attackRange = 85; attackChance = 0.1;
                }

                // Движение к игроку
                if (absDist > attackRange) {
                    if (Math.random() < moveChance) {
                        this.vx = dist > 0 ? this.speed * 0.8 : -this.speed * 0.8;
                    } else {
                        this.vx = 0;
                    }
                } else {
                    this.vx = 0;
                    // Атака
                    if (Math.random() < attackChance) {
                        this.attack(Math.random() < 0.5 ? 'punch' : 'kick');
                    }
                }
            }
        }

        let p1, p2;
        let groundY = 0;

        function updateHeartsUI() {
            let p1Html = '';
            for(let i=1; i<=5; i++) {
                p1Html += `<span class="heart ${i <= p1.hp ? 'full' : ''}">❤</span>`;
            }
            document.getElementById('p1-hearts').innerHTML = p1Html;

            let p2Html = '';
            for(let i=1; i<=5; i++) {
                p2Html += `<span class="heart ${i <= p2.hp ? 'full' : ''}">❤</span>`;
            }
            document.getElementById('p2-hearts').innerHTML = p2Html;
        }

        function checkHit(attacker, defender) {
            if (attacker.isAttacking && attacker.attackTimer === (attacker.attackType === 'punch' ? 10 : 18)) {
                let box = attacker.getAttackBox();
                if (box.x < defender.x + defender.width &&
                    box.x + box.w > defender.x &&
                    box.y < defender.y + defender.height &&
                    box.y + box.h > defender.y) {
                        
                    defender.hp--;
                    updateHeartsUI();
                    
                    defender.vx = attacker.facingRight ? 12 : -12;
                    defender.vy = -6; 
                }
            }
        }

        function initGame() {
            showScreen('game-screen');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height - 50;

            // Загрузка фона для Canvas
            currentBgImg.src = mapData[gameSettings.map];

            // Настройка Игрока 1
            document.getElementById('p1-name').innerText = gameSettings.character;
            p1 = new Fighter(100, gameSettings.character, true); 

            // Генерация ИИ
            const allHeroes = Object.keys(heroData);
            let randomAiHero = allHeroes[Math.floor(Math.random() * allHeroes.length)];
            // Убеждаемся, что бот выбрал кого-то другого, если возможно (для разнообразия)
            while(randomAiHero === gameSettings.character && allHeroes.length > 1) {
                randomAiHero = allHeroes[Math.floor(Math.random() * allHeroes.length)];
            }
            
            document.getElementById('p2-name').innerText = randomAiHero;
            p2 = new Fighter(canvas.width - 200, randomAiHero, false); 
            p2.facingRight = false; 

            updateHeartsUI();

            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) p1.attack('punch'); 
            if (e.button === 2) p1.attack('kick');  
        });

        function gameLoop() {
            // Логика игрока
            p1.vx = 0;
            if (keys['KeyA']) { p1.vx = -p1.speed; p1.facingRight = false; }
            if (keys['KeyD']) { p1.vx = p1.speed; p1.facingRight = true; }
            if (keys['KeyW'] && p1.grounded) { p1.vy = p1.jumpPower; p1.grounded = false; }

            // Логика ИИ
            p2.aiThink(p1);

            if (!keys['KeyA'] && !keys['KeyD']) p1.facingRight = p1.x < p2.x;
            if (Math.abs(p2.vx) < 1) p2.facingRight = p2.x < p1.x; // Бот всегда поворачивается к игроку

            if (!p2.grounded || Math.abs(p2.vx) > p2.speed) p2.vx *= 0.9;
            if (!p1.grounded || Math.abs(p1.vx) > p1.speed) p1.vx *= 0.9;

            p1.update(groundY);
            p2.update(groundY);

            checkHit(p1, p2);
            checkHit(p2, p1); // Бот теперь тоже наносит урон!

            // Отрисовка фона
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentBgImg.complete) {
                ctx.drawImage(currentBgImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            p1.draw(ctx);
            p2.draw(ctx);

            animationId = requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
