<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Битва Героев</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --mortal-red: #c1121f;
            --dark-bg: #0b090a;
            --gold: #fdf0d5;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--dark-bg); font-family: 'Segoe UI', sans-serif;
            color: white; user-select: none; -webkit-user-select: none;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background-size: cover; background-position: center; z-index: 10;
        }

        #menu-screen {
            display: flex;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), 
            url('https://sun9-71.userapi.com/s/v1/ig2/POmRpj44WUzj14uLa-NtzW9oDwDWFFu1AuQXESuPTbWIekL0i5aWkuOhcHqtx4uw7PyTvXBEooeTjIgCfMhenGpJ.jpg?quality=95&as=32x18,48x27,72x40,108x60,160x89,240x134,360x201,480x268,540x301,640x357,720x402,1080x603,1280x714,1376x768&from=bu&u=Lcp1j6ycdHkPclgCks3hZqJE1w299_dUvH6M-nzkpvs&cs=1376x0');
        }

        .title {
            font-size: 55px; font-weight: 900; color: var(--mortal-red);
            text-shadow: 2px 2px 0px #fff, 0 0 20px var(--mortal-red); text-transform: uppercase; margin-bottom: 40px; text-align: center;
        }

        .btn {
            background: rgba(193, 18, 31, 0.8); color: white; border: 2px solid var(--mortal-red);
            padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 5px;
            cursor: pointer; margin: 10px; text-transform: uppercase; box-shadow: 0 0 15px rgba(193, 18, 31, 0.5);
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary { background: transparent; color: var(--gold); border: 2px solid var(--gold); box-shadow: none; }

        h2 { color: var(--gold); text-transform: uppercase; text-shadow: 0 0 10px black; }

        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 95%; margin-bottom: 20px; }
        .char-card { width: 70px; height: 70px; border: 2px solid #555; background-size: cover; background-position: center; cursor: pointer; filter: grayscale(50%); transition: 0.3s; }
        .char-card.active { border: 3px solid var(--mortal-red); filter: grayscale(0%); transform: scale(1.1); box-shadow: 0 0 15px var(--mortal-red); z-index: 2; }
        #selected-char-name { font-size: 24px; font-weight: bold; color: white; height: 30px; margin-bottom: 15px; text-transform: uppercase; text-align: center;}

        .map-grid { display: flex; flex-direction: column; gap: 15px; width: 80%; }
        .map-card { height: 80px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; text-shadow: 1px 1px 3px black; background-size: cover; background-position: center; cursor: pointer; position: relative; }
        .map-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .map-card span { position: relative; z-index: 2; }
        .map-card.active { border-color: var(--gold); }
        .map-card.active::before { background: rgba(0,0,0,0.2); }

        #game-screen { background-color: black; } 
        
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: flex-start;
            padding: 10px 20px; box-sizing: border-box; z-index: 20; background: linear-gradient(rgba(0,0,0,0.8), transparent);
        }

        .player-info { display: flex; flex-direction: column; }
        .player-info.right { align-items: flex-end; }
        .name { font-size: 18px; font-weight: bold; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; text-shadow: 1px 1px 2px black;}
        
        .hearts { display: flex; gap: 5px; }
        .heart { font-size: 20px; color: #555; } 
        .heart.full { color: var(--mortal-red); text-shadow: 0 0 5px red;}

        .fatality-bar { width: 150px; height: 10px; background: #333; margin-top: 5px; border: 1px solid #000; position: relative;}
        .fatality-fill { width: 0%; height: 100%; background: #00d2ff; transition: width 0.3s; box-shadow: 0 0 10px #00d2ff;}
        .fatality-text { position: absolute; width: 100%; text-align: center; top: -2px; font-size: 10px; color: white; font-weight: bold; text-shadow: 1px 1px 1px black; }

        .timer-box { text-align: center; }
        .timer { font-size: 40px; font-weight: 900; color: white; text-shadow: 0 0 10px var(--mortal-red); }
        .round { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: bold;}
        .wins-counter { font-size: 14px; color: white; text-transform: uppercase; margin-top: 5px; }

        #fight-canvas { display: block; width: 100%; height: 100%; }

        #round-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 50; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #round-text { font-size: 50px; color: var(--gold); font-weight: bold; text-transform: uppercase; text-shadow: 0 0 20px red; margin-bottom: 20px; text-align: center;}
    </style>
</head>
<body>

    <div id="menu-screen" class="screen">
        <div class="title">Битва Героев</div>
        <button class="btn" onclick="showScreen('diff-screen')">Начать бой</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html?show=games'">Назад в меню</button>
    </div>

    <div id="diff-screen" class="screen" style="background: var(--dark-bg);">
        <h2>Сложность ИИ</h2>
        <button class="btn" onclick="setDifficulty('easy')">Легкий</button>
        <button class="btn" onclick="setDifficulty('medium')">Средний</button>
        <button class="btn" onclick="setDifficulty('hard')">Сложный</button>
        <button class="btn btn-secondary" onclick="showScreen('menu-screen')" style="margin-top: 30px;">Назад</button>
    </div>

    <div id="char-screen" class="screen" style="background: var(--dark-bg);">
        <h2>Ваш боец</h2>
        <div id="selected-char-name">Железный человек</div>
        <div class="char-grid">
            <div class="char-card active" onclick="selectChar(this, 'Железный человек')" style="background-image: url('https://sun9-69.userapi.com/s/v1/ig2/Hh_oprR6Z3Pv9v0tzbn0E030aRuB-ko5ajRK5insZcOPzckILMQLPSYhJI5zGMgm7tzwZRGQ4dziZxJ7ppCh9sCy.jpg?quality=95&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360,480x480,540x540,640x640,720x720,937x937&from=bu&u=0vp13m8is07OlGZlM734nKC0TNSQ9y_WrIBc93BwxCQ&cs=937x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Супермен')" style="background-image: url('https://sun9-40.userapi.com/s/v1/ig2/PJPl0be_XrRFDF3kES5FhTy9Y0QVVn3LZf9oVcAYSiO5vCSxWFOUCoXR_seRrIoZj4OJtROj0YsA8WITjPXyeb3p.jpg?quality=95&as=32x41,48x62,72x92,108x139,160x205,240x308,360x462,480x616,540x693,542x696&from=bu&u=sEuoaQ0-2bxkVSnoPD5zR9KzYHGiL9lI8eA929y5Idg&cs=542x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Бэтмен')" style="background-image: url('https://sun9-69.userapi.com/s/v1/ig2/Aw_s8HFVhnzn3hkVV73QEA9WDqiYq16OVuvQL2hgOnhhQaMtzlNmrrBLT3-bSjM9Ca8tsP7wSF4MICxfRbC0ZEos.jpg?quality=95&as=32x49,48x74,72x110,108x166,160x245,240x368,360x552,480x736,536x822&from=bu&u=6G-FrJrpFNdxF-9TwTUENKXk-6KYx6VBa1H0X3G6xeg&cs=536x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Капитан Америка')" style="background-image: url('https://sun9-12.userapi.com/s/v1/ig2/tvmGk0j2KtB__2HJkWI7ESyVBAZeIBSvNUzILLJpIZaPYt32LeeffLMA8czjpvwRHeyFwPEcLWZwICIOsTbLeFAP.jpg?quality=95&as=32x48,48x72,72x108,108x162,160x241,240x361,360x541,480x722,540x812,640x962,720x1083,1064x1600&from=bu&u=udipUuD0USLmtMN_qPOc4ZRXgaJJRgaQM4yLT8xnGNE&cs=1064x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Халк')" style="background-image: url('https://sun9-68.userapi.com/s/v1/ig2/J5aLWST6NQiEbIQe1no7Ad84W3YG4F_PDztKHBA7QjQAGc32phYqhKopQMFabgGLJd7Xz8ynushD1jgxa_SAb-FI.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720&from=bu&u=6JVIqaBzTABB2-bMUI0glMbYv3GOcuROUftb8diZjTc&cs=1280x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Тор')" style="background-image: url('https://sun9-12.userapi.com/s/v1/ig2/4TIxfJABSrE_GmkiVio3P6QLCzN7T3mlhGdw43BcRgeSyEDbqdNqd0Xjn7ZzF3q6k1zj1W0vcijSn2B6IvCejIPK.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x270,540x304,640x360,720x405,1080x607,1280x720&from=bu&u=AA5Foquj99uQn-lDPBdjstIBOIbvWhZn8E430KJE0f4&cs=1280x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Чужой')" style="background-image: url('https://sun9-80.userapi.com/s/v1/ig2/dpCLRgZaYCfo8O3b1vw0s9hs6c3QC7njXYpLl2yjCEW-G0sUutwLXkMkZmNmU_DwbAlW2z4yhuqHvmHgFBcw7jW2.jpg?quality=95&as=32x32,48x48,72x71,108x107,160x158,240x238,360x357,480x475,540x535,640x634,720x713,735x728&from=bu&u=7Xopi4op2y4DH5Tdkn9TruUAxjxFqeUp1gyeozguSNU&cs=735x0');"></div>
            <div class="char-card" onclick="selectChar(this, 'Хищник')" style="background-image: url('https://sun9-38.userapi.com/s/v1/ig2/z-mlPZNl6aay5oSt6sY5G-vPK7UQauaKHKRH6TVLQ8SX7wX8U1HelVYghPvf2RYHLoi12uE6i7fiLx27zzg88nfl.jpg?quality=95&as=32x17,48x26,72x38,108x58,160x85,240x128,360x192,480x256,540x288,640x341,720x384,1080x576,1280x683,1440x768,1920x1024&from=bu&u=qQl0CGh3Ikv0FnXrVyFALCPFZC82sWemXEXITmcOt4Q&cs=1920x0');"></div>
        </div>
        <button class="btn" onclick="showScreen('map-screen')">Далее</button>
    </div>

    <div id="map-screen" class="screen" style="background: var(--dark-bg);">
        <h2>Выбор Арены</h2>
        <div class="map-grid">
            <div class="map-card active" onclick="selectMap(this, 'city')" style="background-image: url('https://sun9-6.userapi.com/s/v1/ig2/qRwHP2OtILVf2rZTlGmsA7aUw-Ew67BGQyUMZEkBY7CqCrpOmD6_zf4_r98EfzHrz0m211K96FVf1DDvdDuUdaKO.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=joYKwBr43AZp3c-kO48ixoiXel7gTK6knrtqyhe2vNQ&cs=1408x0');">
                <span>Разрушенный город</span>
            </div>
            <div class="map-card" onclick="selectMap(this, 'ice')" style="background-image: url('https://sun9-57.userapi.com/s/v1/ig2/By5YJ-p0aG8QfZlfEdte91rWVtcH-ds9b78EJxQoynWwo9cU78DCT0KLUha_9kyB5hTFgoz8DlJa7yJCV-GSYERZ.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=gxttBCJPgyD3nnyt_GFKzmjsRXMZLJluYSIX2ZDhPCs&cs=1408x0');">

                <span>Конец жизни</span>
            </div>
        </div>
        <button class="btn" style="margin-top: 20px;" onclick="initMatch()">В БОЙ!</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="hud">
            <div class="player-info">
                <div class="name" id="p1-name">Железный человек</div>
                <div class="hearts" id="p1-hearts"></div>
                <div class="wins-counter" id="p1-wins">Побед: 0</div>
                <div class="fatality-bar">
                    <div class="fatality-fill" id="p1-fatality"></div>
                    <div class="fatality-text" id="p1-f-text">КОМБО: 0%</div>
                </div>
            </div>
            
            <div class="timer-box">
                <div class="timer" id="round-timer">90</div>
                <div class="round" id="round-counter">Раунд 1</div>
            </div>

            <div class="player-info right">
                <div class="name" id="p2-name">Противник</div>
                <div class="hearts" id="p2-hearts"></div>
                <div class="wins-counter" id="p2-wins">Побед: 0</div>
                <div class="fatality-bar">
                    <div class="fatality-fill" id="p2-fatality"></div>
                </div>
            </div>
        </div>
        <canvas id="fight-canvas"></canvas>

        <div id="round-overlay">
            <div id="round-text">КОНЕЦ РАУНДА</div>
            <button class="btn" id="btn-menu-return" style="display:none;" onclick="window.location.reload()">Главное меню</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let gameSettings = { difficulty: 'easy', character: 'Железный человек', map: 'city' };
        let matchState = { currentRound: 1, p1Wins: 0, p2Wins: 0, timeLeft: 90, isPlaying: false };
        let timerInterval;

        const mapData = {
            'city': 'https://sun9-6.userapi.com/s/v1/ig2/qRwHP2OtILVf2rZTlGmsA7aUw-Ew67BGQyUMZEkBY7CqCrpOmD6_zf4_r98EfzHrz0m211K96FVf1DDvdDuUdaKO.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=joYKwBr43AZp3c-kO48ixoiXel7gTK6knrtqyhe2vNQ&cs=1408x0',
            'ice': 'https://sun9-57.userapi.com/s/v1/ig2/By5YJ-p0aG8QfZlfEdte91rWVtcH-ds9b78EJxQoynWwo9cU78DCT0KLUha_9kyB5hTFgoz8DlJa7yJCV-GSYERZ.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=gxttBCJPgyD3nnyt_GFKzmjsRXMZLJluYSIX2ZDhPCs&cs=1408x0',
            'end': 'https://sun9-80.userapi.com/s/v1/ig2/W-usTkJ9s9LBqOI_hJZvHtN4BzKIlF9tjSOG0dKTXu-fdfC-NNl3LXW4HInEAalcDgvEEEP3XQeWR0THlDsg4Nr4.jpg?quality=95&as=32x17,48x26,72x39,108x59,160x87,240x131,360x196,480x262,540x295,640x349,720x393,1080x589,1280x698,1408x768&from=bu&u=gj3rMmIA2duTO9gFlgRR0qSUCA0AKeWJ0yRLMatAtOM&cs=1408x0'
        };

        const heroList = ['Железный человек', 'Супермен', 'Бэтмен', 'Капитан Америка', 'Халк', 'Тор', 'Чужой', 'Хищник'];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        function setDifficulty(d) { gameSettings.difficulty = d; showScreen('char-screen'); }
        function selectChar(element, name) {
            gameSettings.character = name;
            document.getElementById('selected-char-name').innerText = name;
            document.querySelectorAll('.char-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
        }
        function selectMap(element, mapId) {
            gameSettings.map = mapId;
            document.querySelectorAll('.map-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
        }

        showScreen('menu-screen');

        const canvas = document.getElementById('fight-canvas');
        const ctx = canvas.getContext('2d');
        let animationId;
        let keys = {};
        let mouseState = { left: false, right: false };
        let currentBgImg = new Image();
        let globalFrame = 0;
        let projectiles = [];

        canvas.addEventListener('contextmenu', event => event.preventDefault());

        class Projectile {
            constructor(x, y, vx, vy, type, owner) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.type = type; this.owner = owner;
                this.w = 20; this.h = 20; this.active = true;
                this.angle = 0;

                if (type === 'laser') { this.w = 80; this.h = 10; }
                if (type === 'beam') { this.w = 20; this.h = 80; }
                if (type === 'shield') { this.w = 30; this.h = 30; this.returnTimer = 40; }
                if (type === 'axe') { this.w = 30; this.h = 30; }
                if (type === 'plasma') { this.w = 25; this.h = 25; }
                if (type === 'grenade') { this.w = 15; this.h = 15; }
            }

            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.type === 'grenade') this.vy += 0.5; 
                if (this.type === 'shield') {
                    this.returnTimer--;
                    if (this.returnTimer <= 0) { this.vx *= -1; this.returnTimer = 1000; } 
                }
                if (this.type === 'axe' || this.type === 'shield') this.angle += 0.3; 

                if (this.y > groundY || this.x < 0 || this.x > canvas.width) {
                    this.active = false;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                if (this.type === 'laser') { ctx.fillStyle = 'red'; ctx.fillRect(0, 0, this.w, this.h); }
                if (this.type === 'beam') { ctx.fillStyle = '#00d2ff'; ctx.fillRect(0, 0, this.w, this.h); }
                if (this.type === 'plasma') { ctx.fillStyle = '#39ff14'; ctx.beginPath(); ctx.arc(10, 10, 15, 0, Math.PI*2); ctx.fill(); }
                if (this.type === 'grenade') { ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(7, 7, 8, 0, Math.PI*2); ctx.fill(); }
                
                if (this.type === 'shield') { 
                    ctx.rotate(this.angle); 
                    ctx.fillStyle = 'blue'; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill(); 
                }
                
                if (this.type === 'axe') { 
                    ctx.rotate(this.angle); 
                    ctx.fillStyle = '#777'; ctx.fillRect(-5, -15, 10, 30); 
                    ctx.fillStyle = '#999'; ctx.fillRect(-15, -15, 30, 15); 
                }
                ctx.restore();
            }
        }

        class Fighter {
            constructor(x, heroName, isPlayer) {
                this.x = x; this.y = 0; 
                this.heroName = heroName; this.isPlayer = isPlayer;

                // Базовые размеры
                this.width = heroName === 'Халк' ? 90 : 60;
                this.height = heroName === 'Халк' ? 170 : 130;

                this.vx = 0; this.vy = 0; this.speed = heroName === 'Халк' ? 3.5 : 5;
                this.jumpPower = -15; this.gravity = 0.8; this.grounded = false;
                this.hp = 5; this.facingRight = isPlayer; 
                
                this.isAttacking = false; this.attackType = null; this.attackTimer = 0;
                
                this.comboHistory = []; this.lastAttackTime = 0; this.fatalityCharge = 0;
                this.isFatalityMode = false; this.fatalityTimeLeft = 0; this.fatalityCooldown = 0;
            }

            update(groundY) {
                if (this.isFatalityMode && this.heroName === 'Железный человек') {
                    this.gravity = 0;
                    if (this.y > 50) this.vy = -5; else this.vy = 0;
                } else {
                    this.gravity = 0.8;
                }

                this.vy += this.gravity; this.y += this.vy; this.x += this.vx;

                if (this.y + this.height >= groundY) {
                    this.y = groundY - this.height; this.vy = 0; this.grounded = true;
                }

                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

                if (this.isAttacking) {
                    this.attackTimer--;
                    if (this.attackTimer <= 0) { this.isAttacking = false; this.attackType = null; }
                }

                if (this.fatalityCooldown > 0) this.fatalityCooldown--;

                if (this.isFatalityMode) {
                    this.fatalityTimeLeft--;
                    if (this.fatalityTimeLeft <= 0) this.deactivateFatality();
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                if (!this.facingRight) ctx.scale(-1, 1);

                let isPunching = this.isAttacking && this.attackType === 'punch';
                let isKicking = this.isAttacking && this.attackType === 'kick';

                let swing = (this.vx !== 0 && this.grounded) ? Math.sin(globalFrame * 0.2) * 25 : 0;
                if (!this.grounded) swing = 20; 
                let bobbing = (this.vx !== 0 && this.grounded) ? Math.abs(Math.sin(globalFrame * 0.2)) * 5 : 0;
                
                ctx.translate(0, -bobbing); // Покачивание

                // Цвета и детали для каждого героя
                let headC = "#ffcc99", torsoC = "#444", legC = "#333", armC = "#444";
                let hasCape = false, capeC = "red", hasShield = false, isAlien = false, isPredator = false, isIronMan = false, isBatman = false, isThor = false, isSuperman = false;

                switch(this.heroName) {
                    case 'Железный человек': headC = "gold"; torsoC = "#c1121f"; armC = "#c1121f"; legC = "gold"; isIronMan = true; break;
                    case 'Супермен': headC = "#ffcc99"; torsoC = "#0055ff"; armC = "#0055ff"; legC = "red"; hasCape = true; isSuperman = true; break;
                    case 'Бэтмен': headC = "#222"; torsoC = "#333"; armC = "#333"; legC = "#222"; hasCape = true; capeC = "#111"; isBatman = true; break;
                    case 'Капитан Америка': headC = "blue"; torsoC = "#0044cc"; armC = "white"; legC = "blue"; hasShield = true; break;
                    case 'Халк': headC = "#2e8b57"; torsoC = "#2e8b57"; armC = "#2e8b57"; legC = "#4b0082"; break;
                    case 'Тор': headC = "#ffcc99"; torsoC = "#444"; armC = "#ffcc99"; legC = "#222"; hasCape = true; isThor = true; break;
                    case 'Чужой': headC = "#111"; torsoC = "#1a1a1a"; armC = "#111"; legC = "#111"; isAlien = true; break;
                    case 'Хищник': headC = "#5c4033"; torsoC = "#8b4513"; armC = "#5c4033"; legC = "#3e2723"; isPredator = true; break;
                }

                let armW = 14, armH = this.height / 2;
                let legW = 16, legH = this.height / 2;
                let torsoW = this.width * 0.7, torsoH = this.height / 2;
                if (this.heroName === 'Халк') { torsoW = this.width * 0.9; armW = 22; legW = 24; }

                // Плащ сзади
                if (hasCape) {
                    ctx.fillStyle = capeC;
                    ctx.beginPath();
                    ctx.moveTo(-torsoW/3, -torsoH/2);
                    ctx.lineTo(-torsoW - 10 - (this.vx*2), torsoH);
                    ctx.lineTo(0 - (this.vx*2), torsoH);
                    ctx.fill();
                }

                // Хвост чужого
                if (isAlien) {
                    ctx.strokeStyle = "#111"; ctx.lineWidth = 10;
                    ctx.beginPath(); ctx.moveTo(-10, 0); ctx.quadraticCurveTo(-60, 20, -50 + swing/2, -30); ctx.stroke();
                }

                // Хвост хищника (Фаталити)
                if (this.isFatalityMode && isPredator) {
                    ctx.strokeStyle = "#5c4033"; ctx.lineWidth = 12;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-60, 20, -100, -20); ctx.stroke();
                    ctx.fillStyle = "silver"; ctx.fillRect(-90, -10, 5, 15); ctx.fillRect(-100, -20, 5, 15);
                }

                // ЗАДНЯЯ НОГА
                ctx.fillStyle = legC;
                ctx.save(); ctx.translate(0, torsoH/2 - 5); ctx.rotate(-swing * Math.PI/180); ctx.fillRect(-legW/2, 0, legW, legH); ctx.restore();

                // ЗАДНЯЯ РУКА
                ctx.fillStyle = armC;
                ctx.save(); ctx.translate(0, -torsoH/2 + 10); ctx.rotate(swing * Math.PI/180); ctx.fillRect(-armW/2, 0, armW, armH); ctx.restore();

                // ТОРС
                ctx.fillStyle = torsoC;
                ctx.fillRect(-torsoW/2, -torsoH/2, torsoW, torsoH);

                // Детали торса
                if (isIronMan) { ctx.fillStyle = "#00d2ff"; ctx.beginPath(); ctx.arc(5, -torsoH/4, 8, 0, Math.PI*2); ctx.fill(); }
                if (isBatman) { ctx.fillStyle = "yellow"; ctx.fillRect(-torsoW/2, torsoH/2 - 10, torsoW, 10); } // Пояс
                if (isSuperman) { ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.moveTo(0, -torsoH/4); ctx.lineTo(10, 0); ctx.lineTo(-5, 0); ctx.fill(); ctx.fillStyle = "red"; ctx.fillRect(2, -torsoH/4 + 2, 4, 4); }
                if (isThor) { ctx.fillStyle = "silver"; ctx.beginPath(); ctx.arc(5, -torsoH/4, 6, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-5, 0, 6, 0, Math.PI*2); ctx.fill(); }

                // ГОЛОВА
                ctx.fillStyle = headC;
                if (isAlien) {
                    ctx.beginPath(); ctx.ellipse(5, -torsoH/2 - 15, 25, 12, -0.2, 0, Math.PI*2); ctx.fill(); // Вытянутая
                } else {
                    ctx.beginPath(); ctx.arc(0, -torsoH/2 - 15, 16, 0, Math.PI*2); ctx.fill();
                }

                // Детали головы
                if (isBatman) {
                    ctx.beginPath(); ctx.moveTo(-10, -torsoH/2 - 25); ctx.lineTo(-15, -torsoH/2 - 40); ctx.lineTo(-5, -torsoH/2 - 25); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(10, -torsoH/2 - 25); ctx.lineTo(15, -torsoH/2 - 40); ctx.lineTo(5, -torsoH/2 - 25); ctx.fill();
                    ctx.fillStyle = "#ffe4b5"; ctx.fillRect(-5, -torsoH/2 - 10, 15, 8); // Открытый рот
                }
                if (isPredator) {
                    ctx.strokeStyle = "black"; ctx.lineWidth = 3;
                    for(let i=0; i<4; i++) { ctx.beginPath(); ctx.moveTo(-10, -torsoH/2 - 10); ctx.lineTo(-20 - i*5, -torsoH/2 + 10 + swing/4); ctx.stroke(); }
                    ctx.fillStyle = "silver"; ctx.fillRect(-5, -torsoH/2 - 20, 10, 20); // Маска
                }
                if (isIronMan) { ctx.fillStyle = "#00d2ff"; ctx.fillRect(5, -torsoH/2 - 20, 8, 4); } // Глаза

                // ПЕРЕДНЯЯ НОГА
                ctx.fillStyle = legC;
                ctx.save(); 
                ctx.translate(0, torsoH/2 - 5); 
                if (isKicking) {
                    ctx.rotate(-Math.PI/2); ctx.fillRect(-legW/2, 0, legW, legH + 10); 
                } else {
                    ctx.rotate(swing * Math.PI/180); ctx.fillRect(-legW/2, 0, legW, legH); 
                }
                ctx.restore();

                // ПЕРЕДНЯЯ РУКА
                ctx.fillStyle = armC;
                ctx.save(); 
                ctx.translate(0, -torsoH/2 + 10); 
                if (isPunching) {
                    ctx.rotate(-Math.PI/2); ctx.fillRect(-armW/2, 0, armW, armH + 10);
                    if (hasShield) { ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(armH, 0, 14, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(armH, 0, 6, 0, Math.PI*2); ctx.fill(); }
                    if (isThor) { ctx.fillStyle = "#777"; ctx.fillRect(armH, -15, 10, 30); ctx.fillStyle = "#555"; ctx.fillRect(armH-10, -15, 30, 15); }
                } else {
                    ctx.rotate(-swing * Math.PI/180); ctx.fillRect(-armW/2, 0, armW, armH); 
                    if (hasShield) { ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(0, armH/2, 14, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(0, armH/2, 6, 0, Math.PI*2); ctx.fill(); }
                    if (isThor) { ctx.fillStyle = "#777"; ctx.fillRect(-5, armH, 10, 30); ctx.fillStyle = "#555"; ctx.fillRect(-15, armH+20, 30, 15); }
                }
                ctx.restore();

                // Аура Фаталити
                if (this.isFatalityMode) {
                    ctx.strokeStyle = this.isPlayer ? "#00ff00" : "#ff00ff";
                    ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 20; ctx.lineWidth = 2;
                    ctx.strokeRect(-this.width/2 - 5, -this.height/2 - 5, this.width + 10, this.height + 10);
                    ctx.shadowBlur = 0;
                }

                ctx.restore();
            }

            attack(type) {
                if (!this.isAttacking) {
                    let now = Date.now();
                    if (now - this.lastAttackTime > 1500) this.comboHistory = []; 
                    this.lastAttackTime = now;
                    this.comboHistory.push(type);

                    if (this.comboHistory.join(',') === 'punch,kick,punch') {
                        this.fatalityCharge += 50; 
                        if (this.fatalityCharge > 100) this.fatalityCharge = 100;
                        this.comboHistory = [];
                        updateUI(); 
                    } else if (this.comboHistory.length >= 3) {
                        this.comboHistory.shift(); 
                    }

                    this.isAttacking = true; this.attackType = type;
                    this.attackTimer = type === 'punch' ? 12 : 20; 

                    if (this.isFatalityMode) this.useFatalityAttack();
                }
            }

            useFatalityAttack() {
                if (this.fatalityCooldown > 0) return;
                let dir = this.facingRight ? 1 : -1;
                
                if (this.heroName === 'Железный человек') projectiles.push(new Projectile(this.x + this.width/2, this.y + this.height, 0, 15, 'beam', this));
                else if (this.heroName === 'Супермен') projectiles.push(new Projectile(this.x + this.width/2, this.y + 20, dir * 20, 0, 'laser', this));
                else if (this.heroName === 'Бэтмен') projectiles.push(new Projectile(this.x + this.width/2, this.y + 20, dir * 12, -8, 'grenade', this));
                else if (this.heroName === 'Капитан Америка') projectiles.push(new Projectile(this.x + this.width/2, this.y + 40, dir * 18, 0, 'shield', this));
                else if (this.heroName === 'Тор') projectiles.push(new Projectile(this.x + this.width/2, this.y + 40, dir * 15, 0, 'axe', this));
                else if (this.heroName === 'Чужой') projectiles.push(new Projectile(this.x + (this.facingRight ? this.width : -20), this.y + 20, dir * 25, 0, 'plasma', this));
                
                this.fatalityCooldown = 30; 
            }

            activateFatality() {
                this.isFatalityMode = true;
                this.fatalityTimeLeft = 20 * 60; 
                
                if (this.heroName === 'Халк') {
                    let oldH = this.height;
                    this.width *= 1.5; this.height *= 1.5;
                    this.y -= (this.height - oldH);
                }
                updateUI();
            }

            deactivateFatality() {
                this.isFatalityMode = false;
                this.fatalityCharge = 0;
                
                if (this.heroName === 'Халк') {
                    let oldH = this.height;
                    this.width /= 1.5; this.height /= 1.5;
                    this.y -= (this.height - oldH);
                }
                updateUI();
            }

            getAttackBox() {
                let box = { w: 0, h: 0, x: 0, y: 0 };
                if (this.attackType === 'punch') {
                    box.w = 50; box.h = 20;
                    box.x = this.facingRight ? this.x + this.width : this.x - box.w;
                    box.y = this.y + this.height/4; 
                } else if (this.attackType === 'kick') {
                    box.w = 60; box.h = 25; 
                    box.x = this.facingRight ? this.x + this.width : this.x - box.w;
                    box.y = this.y + this.height/2; 
                }

                if (this.isFatalityMode && this.heroName === 'Хищник') box.w = 160; 

                return box;
            }

            aiThink(enemy) {
                if (this.isPlayer) return;
                
                if (this.fatalityCharge >= 100 && !this.isFatalityMode) this.activateFatality();

                let dist = enemy.x - this.x; let absDist = Math.abs(dist);
                let moveChance = 0.7, attackRange = 70, attackChance = 0.05;
                if (gameSettings.difficulty === 'hard') { moveChance = 0.9; attackRange = 85; attackChance = 0.1; }

                if (absDist > attackRange) {
                    if (Math.random() < moveChance) this.vx = dist > 0 ? this.speed * 0.8 : -this.speed * 0.8;
                    else this.vx = 0;
                } else {
                    this.vx = 0;
                    if (Math.random() < attackChance) this.attack(Math.random() < 0.5 ? 'punch' : 'kick');
                }
            }
        }

        let p1, p2, groundY = 0;

        function updateUI() {
            let p1Html = ''; for(let i=1; i<=5; i++) p1Html += `<span class="heart ${i <= p1.hp ? 'full' : ''}">❤</span>`;
            document.getElementById('p1-hearts').innerHTML = p1Html;

            let p2Html = ''; for(let i=1; i<=5; i++) p2Html += `<span class="heart ${i <= p2.hp ? 'full' : ''}">❤</span>`;
            document.getElementById('p2-hearts').innerHTML = p2Html;

            document.getElementById('p1-wins').innerText = `Побед: ${matchState.p1Wins}`;
            document.getElementById('p2-wins').innerText = `Побед: ${matchState.p2Wins}`;
            document.getElementById('round-counter').innerText = `Раунд ${matchState.currentRound}`;
            document.getElementById('round-timer').innerText = matchState.timeLeft;

            document.getElementById('p1-fatality').style.width = p1.fatalityCharge + "%";
            document.getElementById('p2-fatality').style.width = p2.fatalityCharge + "%";

            if (p1.isFatalityMode) {
                document.getElementById('p1-f-text').innerText = "ФАТАЛИТИ!";
                document.getElementById('p1-f-text').style.color = "red";
            } else {
                document.getElementById('p1-f-text').innerText = p1.fatalityCharge >= 100 ? "ГОТОВО! (ЛКМ + ПКМ)" : `КОМБО: ${p1.fatalityCharge}%`;
                document.getElementById('p1-f-text').style.color = "white";
            }
        }

        function applyDamage(target, attacker, isProjectile = false, projType = '') {
            let dmg = 1;
            if (attacker.isFatalityMode && (attacker.heroName === 'Халк' || attacker.heroName === 'Хищник')) dmg = 3;
            if (isProjectile && projType === 'plasma') dmg = 5;

            target.hp -= dmg;
            target.vx = (attacker.x < target.x) ? 15 : -15; 
            target.vy = -5; 
            updateUI();
            checkRoundEnd();
        }

        function checkMeleeHit(attacker, defender) {
            if (attacker.isAttacking && attacker.attackTimer === (attacker.attackType === 'punch' ? 10 : 18)) {
                let box = attacker.getAttackBox();
                if (box.x < defender.x + defender.width && box.x + box.w > defender.x &&
                    box.y < defender.y + defender.height && box.y + box.h > defender.y) {
                    applyDamage(defender, attacker);
                }
            }
        }

        function timerTick() {
            if (!matchState.isPlaying) return;
            matchState.timeLeft--;
            updateUI();
            if (matchState.timeLeft <= 0) {
                if (p1.hp > p2.hp) p2.hp = 0; else if (p2.hp > p1.hp) p1.hp = 0; else { p1.hp = 0; p2.hp = 0; } 
                checkRoundEnd();
            }
        }

        function checkRoundEnd() {
            if (p1.hp <= 0 || p2.hp <= 0) {
                matchState.isPlaying = false;
                clearInterval(timerInterval);

                let text = "НИЧЬЯ!";
                if (p1.hp > 0 && p2.hp <= 0) { matchState.p1Wins++; text = `${p1.heroName} ПОБЕДИЛ!`; }
                else if (p2.hp > 0 && p1.hp <= 0) { matchState.p2Wins++; text = `${p2.heroName} ПОБЕДИЛ!`; }

                document.getElementById('round-text').innerText = text;
                document.getElementById('round-overlay').style.display = 'flex';

                setTimeout(() => {
                    if (matchState.p1Wins >= 2 || matchState.p2Wins >= 2) {
                        document.getElementById('round-text').innerText = matchState.p1Wins >= 2 ? "ВЫ ВЫИГРАЛИ БОЙ!" : "ВЫ ПРОИГРАЛИ...";
                        document.getElementById('btn-menu-return').style.display = 'block';
                    } else {
                        matchState.currentRound++;
                        startRound();
                    }
                }, 3000);
            }
        }

        function initMatch() {
            showScreen('game-screen');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            groundY = canvas.height - 50;
            currentBgImg.src = mapData[gameSettings.map];

            let randomAiHero = heroList[Math.floor(Math.random() * heroList.length)];
            while(randomAiHero === gameSettings.character) randomAiHero = heroList[Math.floor(Math.random() * heroList.length)];
            
            document.getElementById('p1-name').innerText = gameSettings.character;
            document.getElementById('p2-name').innerText = randomAiHero;
            
            matchState = { currentRound: 1, p1Wins: 0, p2Wins: 0, timeLeft: 90, isPlaying: false };
            
            startRound(randomAiHero);
        }

        function startRound(aiHeroName = null) {
            document.getElementById('round-overlay').style.display = 'none';
            projectiles = []; 
            
            p1 = new Fighter(100, gameSettings.character, true); 
            p2 = new Fighter(canvas.width - 200, aiHeroName || document.getElementById('p2-name').innerText, false); 
            p2.facingRight = false; 

            matchState.timeLeft = 90; matchState.isPlaying = true;
            updateUI();

            clearInterval(timerInterval); timerInterval = setInterval(timerTick, 1000);
            if (!animationId) gameLoop();
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        canvas.addEventListener('mousedown', e => {
            if (!matchState.isPlaying) return;
            if (e.button === 0) mouseState.left = true;
            if (e.button === 2) mouseState.right = true;

            if (mouseState.left && mouseState.right) {
                if (p1.fatalityCharge >= 100 && !p1.isFatalityMode) {
                    p1.activateFatality();
                }
            } else {
                if (e.button === 0) p1.attack('punch'); 
                if (e.button === 2) p1.attack('kick');  
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (e.button === 0) mouseState.left = false;
            if (e.button === 2) mouseState.right = false;
        });

        function gameLoop() {
            globalFrame++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentBgImg.complete) ctx.drawImage(currentBgImg, 0, 0, canvas.width, canvas.height);
            else { ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height); }

            if (matchState.isPlaying) {
                p1.vx = 0;
                if (keys['KeyA']) { p1.vx = -p1.speed; p1.facingRight = false; }
                if (keys['KeyD']) { p1.vx = p1.speed; p1.facingRight = true; }
                if (keys['KeyW'] && p1.grounded) { p1.vy = p1.jumpPower; p1.grounded = false; }

                p2.aiThink(p1);

                if (!keys['KeyA'] && !keys['KeyD']) p1.facingRight = p1.x < p2.x;
                if (Math.abs(p2.vx) < 1) p2.facingRight = p2.x < p1.x; 

                if (!p2.grounded || Math.abs(p2.vx) > p2.speed) p2.vx *= 0.9;
                if (!p1.grounded || Math.abs(p1.vx) > p1.speed) p1.vx *= 0.9;

                p1.update(groundY); p2.update(groundY);
                checkMeleeHit(p1, p2); checkMeleeHit(p2, p1);

                for (let i = projectiles.length - 1; i >= 0; i--) {
                    let proj = projectiles[i];
                    proj.update();
                    proj.draw(ctx);

                    let target = proj.owner === p1 ? p2 : p1;
                    
                    if (proj.active && 
                        proj.x < target.x + target.width && proj.x + proj.w > target.x &&
                        proj.y < target.y + target.height && proj.y + proj.h > target.y) {
                        
                        applyDamage(target, proj.owner, true, proj.type);
                        proj.active = false;
                    }
                    if (!proj.active) projectiles.splice(i, 1);
                }
            }

            p1.draw(ctx); p2.draw(ctx);
            animationId = requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
