<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Все или ничего</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --main-color: #e94560;
            --text-color: #fff;
            --panel-bg: rgba(0, 0, 0, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color); overflow: hidden; user-select: none;
            touch-action: none; 
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #16213e 0%, #0f3460 100%); z-index: 10;
        }

        .active-screen { display: flex !important; }

        /* ЭКРАН БЛОКИРОВКИ ВЕРТИКАЛЬНОГО РЕЖИМА */
        #rotate-screen {
            background-color: var(--bg-color); z-index: 9999;
            text-align: center; padding: 20px; color: var(--main-color);
        }
        .rotate-icon { font-size: 60px; margin-bottom: 20px; animation: rotateAnim 1.5s infinite; }
        @keyframes rotateAnim {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        /* Главное меню */
        .logo-container { margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; border: 3px solid var(--main-color);}
        .logo-container img { display: block; max-width: 600px; width: 100%; height: auto; }
        
        .btn {
            background: linear-gradient(90deg, #e94560, #c81d3f); color: white;
            border: none; padding: 15px 40px; font-size: 20px; font-weight: bold;
            border-radius: 5px; cursor: pointer; margin: 10px; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); transition: 0.2s; min-width: 250px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); }
        .btn-secondary { background: transparent; border: 2px solid #e94560; box-shadow: none; }

        h2 { color: #fff; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-size: 30px; margin-bottom: 30px; text-align: center;}

        /* Сетки выбора */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; width: 80%; max-width: 900px; max-height: 50vh; overflow-y: auto; padding: 10px;
        }
        .card {
            background: var(--panel-bg); border: 2px solid #333; border-radius: 10px;
            padding: 15px; text-align: center; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80px;
            -webkit-tap-highlight-color: transparent;
        }
        .card:hover { border-color: var(--main-color); background: rgba(233, 69, 96, 0.1); }
        .card.selected { border-color: var(--main-color); background: rgba(233, 69, 96, 0.3); transform: scale(1.05); }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 5px;}
        .card-sub { font-size: 13px; color: #aaa; }

        /* Игровой интерфейс */
        #game-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 20; display: none;
        }
        
        .hud-left { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .timer-box, .lap-box {
            background: var(--panel-bg); padding: 10px 20px; border-radius: 5px;
            border-left: 5px solid var(--main-color); font-family: monospace;
        }
        .timer-text { font-size: 30px; font-weight: bold; color: #fff; }
        .lap-text { font-size: 24px; font-weight: bold; color: #fdf0d5; }

        .standings {
            background: var(--panel-bg); padding: 10px; border-radius: 5px; width: 280px; font-size: 14px;
        }
        .standings-header { font-weight: bold; color: var(--main-color); margin-bottom: 5px; border-bottom: 1px solid #555; padding-bottom: 5px;}
        .standings-row { display: flex; justify-content: space-between; margin: 4px 0; padding: 4px 6px; border-radius: 3px;}
        .standings-row.player { background: rgba(233, 69, 96, 0.4); font-weight: bold; }

        .boost-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 300px; text-align: center; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px;
        }
        .boost-label { font-size: 14px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; color: #00d2ff;}
        .boost-bar-bg { width: 100%; height: 15px; background: #333; border: 2px solid #000; border-radius: 8px; overflow: hidden; }
        .boost-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); transition: width 0.1s; }
        .boost-ready { color: #fff; text-shadow: 0 0 10px #00d2ff; animation: pulse 1s infinite;}

        #game-canvas { display: block; background-color: #27ae60; }

        /* Оверлей результатов */
        #results-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 50; display: none;
            flex-direction: column; align-items: center; justify-content: center; pointer-events: auto;
        }
        .results-table { background: #111; padding: 20px; border-radius: 10px; border: 2px solid var(--main-color); margin-bottom: 20px; width: 90%; max-width: 650px;}
        .res-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; font-size: 18px;}
        .res-row span:nth-child(1) { width: 40px; text-align: left; }
        .res-row span:nth-child(2) { flex: 1; text-align: left; padding-left: 10px;}
        .res-row span:nth-child(3) { width: 150px; text-align: right; }
        
        .res-row:nth-child(1) { color: gold; font-weight: bold; font-size: 22px;}
        .res-row:nth-child(2) { color: silver; font-weight: bold; }
        .res-row:nth-child(3) { color: #cd7f32; font-weight: bold; }
        .res-btns { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; justify-content: center;}

        /* --- ТАЙМЕР ОТСЧЕТА --- */
        #countdown-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); z-index: 40; pointer-events: none;
        }
        #countdown-text {
            font-size: 180px; font-weight: 900; color: var(--main-color);
            text-shadow: 0 0 40px rgba(0,0,0,0.9), 0 0 15px white;
            animation: zoom 1s infinite;
        }
        @keyframes zoom { 0% { transform: scale(1); opacity: 1;} 100% { transform: scale(1.3); opacity: 0;} }

        /* --- МОБИЛЬНОЕ УПРАВЛЕНИЕ --- */
        #mobile-ctrl {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: none; justify-content: space-between; align-items: flex-end; padding: 0 40px;
            box-sizing: border-box; z-index: 30; pointer-events: none; 
        }
        .ctrl-group-left { display: flex; gap: 15px; pointer-events: auto; align-items: flex-end; }
        .ctrl-group-right { display: flex; flex-direction: column; align-items: center; pointer-events: auto; gap: 10px; }
        .ctrl-row { display: flex; gap: 15px; }
        
        .ctrl-btn {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.5); color: white; font-size: 30px;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent; cursor: pointer;
        }
        .ctrl-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.4); }
        #btn-boost { background: rgba(193, 18, 31, 0.8); border-color: white; box-shadow: 0 0 15px red; font-size: 35px; margin-bottom: 10px;}
        .boost-active-anim { animation: pulse 1s infinite; }

        @media screen and (max-width: 950px) {
            .standings { width: 220px; font-size: 12px; } 
            .timer-text { font-size: 22px; }
            .lap-text { font-size: 18px; }
            .hud-left { gap: 10px; top: 10px; left: 10px;}
            .boost-container { bottom: 10px; }
        }
    </style>
</head>
<body>

    <div id="rotate-screen" class="screen" style="display: none;">
        <div class="rotate-icon">🔄</div>
        <h2>Пожалуйста, поверните телефон горизонтально</h2>
        <p style="color: white;">Для гонки требуется широкий экран.</p>
    </div>

    <div id="main-menu" class="screen active-screen">
        <div class="logo-container">
            <img src="https://sun9-73.userapi.com/s/v1/ig2/TtIRYLEzXJ1SNcF4h-1ubN0QXML7d6PvmMFDMzOU5yCuLQNnGoaMglXka5yCc9S1BstpEKplcJWNb7HYG60yhP6L.jpg?quality=95&as=32x18,48x27,72x40,108x60,160x89,240x134,360x201,480x268,540x301,640x357,720x402,1080x603,1280x714,1376x768&from=bu&u=oY74HXwdRJtvhLJFhTLtqeG0P-9ijkrlNGBJaN7kSc4&cs=1376x0" alt="Логотип">
        </div>
        <button class="btn" onclick="showScreen('team-select')">Начать заезд</button>
        <button class="btn btn-secondary" onclick="alert('Браузерная версия. Обновите страницу для выхода.')">Выход</button>
    </div>

    <div id="team-select" class="screen">
        <h2>Выберите команду</h2>
        <div class="grid-container" id="teams-grid"></div>
        <div style="margin-top: 20px;">
            <button class="btn" onclick="proceedToDrivers()">Далее</button>
            <button class="btn btn-secondary" onclick="showScreen('main-menu')">Назад</button>
        </div>
    </div>

    <div id="driver-select" class="screen">
        <h2>Выберите гонщика</h2>
        <div class="grid-container" id="drivers-grid"></div>
        <div style="margin-top: 20px;">
            <button class="btn" onclick="proceedToTrack()">Далее</button>
            <button class="btn btn-secondary" onclick="showScreen('team-select')">Назад</button>
        </div>
    </div>

    <div id="track-select" class="screen">
        <h2>Выберите трассу</h2>
        <div class="grid-container" id="tracks-grid"></div>
        <div style="margin-top: 20px;">
            <button class="btn" onclick="proceedToModeSelect()">Далее</button>
            <button class="btn btn-secondary" onclick="showScreen('driver-select')">Назад</button>
        </div>
    </div>

    <div id="mode-select" class="screen">
        <h2>Подготовка к Гран-при</h2>
        <h3 id="final-setup-info" style="color: #aaa; margin-bottom: 30px; text-align: center;"></h3>
        <button class="btn" onclick="startSession('quali')">Квалификация (1 круг)</button>
        <button class="btn" onclick="startSession('race')">Начать заезд сразу (Старт с 10 места)</button>
        <button class="btn btn-secondary" onclick="showScreen('track-select')" style="margin-top: 20px;">Назад</button>
    </div>

    <canvas id="game-canvas"></canvas>
    
    <div id="game-ui">
        <div class="hud-left">
            <div class="timer-box"><div class="timer-text" id="ui-time">00:00.000</div></div>
            <div class="lap-box"><div class="lap-text" id="ui-lap">Круг: 1/3</div></div>
            <div class="standings">
                <div class="standings-header">ПОЗИЦИИ</div>
                <div id="ui-standings"></div>
            </div>
        </div>

        <div class="boost-container">
            <div class="boost-label" id="boost-label">УСКОРЕНИЕ (ПРОБЕЛ / ⚡)</div>
            <div class="boost-bar-bg">
                <div class="boost-bar-fill" id="boost-fill"></div>
            </div>
        </div>
    </div>

    <div id="countdown-overlay">
        <div id="countdown-text">10</div>
    </div>

    <div id="mobile-ctrl">
        <div class="ctrl-group-left">
            <div class="ctrl-btn" id="btn-brake">▼</div>
            <div class="ctrl-btn" id="btn-gas">▲</div>
        </div>
        <div class="ctrl-group-right">
            <div class="ctrl-btn" id="btn-boost">⚡</div>
            <div class="ctrl-row">
                <div class="ctrl-btn" id="btn-left">◀</div>
                <div class="ctrl-btn" id="btn-right">▶</div>
            </div>
        </div>
    </div>

    <div id="results-overlay">
        <h2 id="res-title" style="font-size: 40px; color: var(--main-color); text-transform: uppercase;">Итоги</h2>
        <div class="results-table" id="res-table"></div>
        <div class="res-btns">
            <button class="btn" id="btn-next-session" onclick="transitionToRace()" style="display:none;">Перейти к гонке</button>
            <button class="btn btn-secondary" id="btn-to-teams" onclick="returnToTeams()">В меню команд</button>
            <button class="btn btn-secondary" onclick="resetGame()">В главное меню</button>
        </div>
    </div>

    <script>
        const teams = [
            { id: 'avtovaz', name: 'АвтоВАЗ', color: '#e67e22' },
            { id: 'kamaz', name: 'КАМАЗ', color: '#2980b9' },
            { id: 'lada', name: 'Лада', color: '#c0392b' },
            { id: 'moskvich', name: 'Москвич', color: '#27ae60' },
            { id: 'avangard', name: 'Авангард', color: '#8e44ad' }
        ];

        const roster = {
            'avtovaz': ['Фернандо Алонсо', 'Себастьян Феттель'],
            'kamaz': ['Серхио Перез', 'Юки Цунода'],
            'lada': ['Макс Ферстаппен', 'Шарль Леклер'],
            'moskvich': ['Кими Антонелли', 'Пьер Гасли'],
            'avangard': ['Льюис Хэмилтон', 'Джордж Рассел']
        };

        const tracksConfig = [
            { id: 'nevsky', name: 'Невский Гран-при', sub: 'Санкт-Петербург', desc: 'Скоростные прямые и мосты',
              points: [[1250,0], [2500,0], [2500,1000], [1800,1000], [1800,500], [800,500], [800,1000], [0,1000], [0,0]] },
            { id: 'moscow', name: 'Московский Урбан Ринг', sub: 'Москва', desc: 'Плотные повороты',
              points: [[500,0], [1000,0], [1000,600], [1800,600], [1800,1200], [500,1200], [500,600], [0,600], [0,0]] },
            { id: 'kazan', name: 'Казанский Кольцевой Трек', sub: 'Казань', desc: 'Плавные связки',
              points: [[600,-200], [1200,-400], [2200,0], [2500,900], [1800,1400], [1000,1100], [200,1400], [-300,900], [0,0]] },
            { id: 'sochi', name: 'Сочинский Прибрежный', sub: 'Сочи', desc: 'Затяжные повороты',
              points: [[900,150], [1800,300], [2300,1000], [1400,1800], [700,1200], [-400,1000], [0,0]] },
            { id: 'ekat', name: 'Индустриальный Ринг', sub: 'Екатеринбург', desc: 'Жесткий трек',
              points: [[1250,0], [2500,0], [1200, 1800], [0,0]] }
        ];

        let state = {
            team: null, driver: null, track: null, session: 'none', 
            racePhase: 'menu', 
            timeParams: { start: 0, current: 0 }
        };

        function checkOrientation() {
            let rotScreen = document.getElementById('rotate-screen');
            let mobCtrl = document.getElementById('mobile-ctrl');
            
            if (state.racePhase === 'menu') {
                rotScreen.style.display = 'none';
                mobCtrl.style.display = 'none';
                return;
            }
            
            if (window.innerHeight > window.innerWidth) {
                rotScreen.style.display = 'flex';
                mobCtrl.style.display = 'none';
            } else {
                rotScreen.style.display = 'none';
                if (window.innerWidth <= 950 && state.racePhase !== 'finished') {
                    mobCtrl.style.display = 'flex';
                } else {
                    mobCtrl.style.display = 'none';
                }
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            if(id === 'team-select') renderTeams();
            if(id === 'track-select') renderTracks();
            document.getElementById('game-ui').style.display = 'none';
            state.racePhase = 'menu';
            checkOrientation();
        }

        function renderTeams() {
            const grid = document.getElementById('teams-grid');
            grid.innerHTML = '';
            teams.forEach(t => {
                let div = document.createElement('div');
                div.className = `card ${state.team === t.id ? 'selected' : ''}`;
                div.style.borderBottom = `5px solid ${t.color}`;
                div.innerHTML = `<div class="card-title">${t.name}</div>`;
                div.onclick = () => { state.team = t.id; renderTeams(); };
                grid.appendChild(div);
            });
        }

        function proceedToDrivers() {
            if(!state.team) return alert('Брат, выбери команду перед тем, как идти дальше!');
            showScreen('driver-select');
            const grid = document.getElementById('drivers-grid');
            grid.innerHTML = '';
            roster[state.team].forEach(d => {
                let div = document.createElement('div');
                div.className = `card ${state.driver === d ? 'selected' : ''}`;
                div.innerHTML = `<div class="card-title">${d}</div><div class="card-sub">${teams.find(t=>t.id===state.team).name}</div>`;
                div.onclick = () => { state.driver = d; proceedToDrivers(); };
                grid.appendChild(div);
            });
        }

        function proceedToTrack() {
            if(!state.driver) return alert('Брат, выбери гонщика, а то болид пустой поедет!');
            showScreen('track-select');
        }

        function proceedToModeSelect() {
            if(!state.track) return alert('Брат, ты забыл выбрать трассу! Кликни на любую карточку.');
            showScreen('mode-select');
        }

        function renderTracks() {
            const grid = document.getElementById('tracks-grid');
            grid.innerHTML = '';
            tracksConfig.forEach(t => {
                let div = document.createElement('div');
                div.className = `card ${state.track === t.id ? 'selected' : ''}`;
                div.innerHTML = `<div class="card-title">${t.name}</div><div class="card-sub">${t.sub}<br>${t.desc}</div>`;
                div.onclick = () => { state.track = t.id; renderTracks(); updateSetupInfo(); };
                grid.appendChild(div);
            });
        }

        function updateSetupInfo() {
            if(state.driver && state.track) {
                const tr = tracksConfig.find(t=>t.id===state.track);
                document.getElementById('final-setup-info').innerText = `Гонщик: ${state.driver}\nТрасса: ${tr.name}`;
            }
        }

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        let keys = {};
        let cars = [];
        let waypoints = [];
        let animId;
        const TRACK_WIDTH = 250;

        let trees = [];
        let fansDots = [];

        function distToSegment(x, y, x1, y1, x2, y2) {
            let A = x - x1, B = y - y1, C = x2 - x1, D = y2 - y1;
            let dot = A * C + B * D;
            let len_sq = C * C + D * D;
            let param = -1;
            if (len_sq != 0) param = dot / len_sq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            let dx = x - xx, dy = y - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function generateScenery() {
            trees = [];
            fansDots = [];
            let fanColors = ["#ff3333", "#3333ff", "#ffffff", "#ffff33", "#ff33ff", "#33ffff"];
            
            let minX = Math.min(...waypoints.map(w=>w.x)) - 1000;
            let maxX = Math.max(...waypoints.map(w=>w.x)) + 1000;
            let minY = Math.min(...waypoints.map(w=>w.y)) - 1000;
            let maxY = Math.max(...waypoints.map(w=>w.y)) + 1000;

            for(let i=0; i<400; i++) {
                let tx = minX + Math.random()*(maxX-minX);
                let ty = minY + Math.random()*(maxY-minY);
                let minD = Infinity;
                for(let j=0; j<waypoints.length; j++) {
                    let d = distToSegment(tx, ty, waypoints[j].x, waypoints[j].y, waypoints[(j+1)%waypoints.length].x, waypoints[(j+1)%waypoints.length].y);
                    if(d < minD) minD = d;
                }
                if (minD > TRACK_WIDTH/2 + 50 && minD < 1200) {
                    trees.push({x: tx, y: ty, r: 15 + Math.random()*25});
                }
            }

            for(let i=0; i<150; i++) {
                let fx = minX + Math.random()*(maxX-minX);
                let fy = minY + Math.random()*(maxY-minY);
                let minD = Infinity;
                for(let j=0; j<waypoints.length; j++) {
                    let d = distToSegment(fx, fy, waypoints[j].x, waypoints[j].y, waypoints[(j+1)%waypoints.length].x, waypoints[(j+1)%waypoints.length].y);
                    if(d < minD) minD = d;
                }
                if (minD > TRACK_WIDTH/2 + 10 && minD < TRACK_WIDTH/2 + 80) {
                    let numDots = 15 + Math.random()*30;
                    for(let k=0; k<numDots; k++) {
                        fansDots.push({
                            x: fx + (Math.random()-0.5)*60,
                            y: fy + (Math.random()-0.5)*60,
                            c: fanColors[Math.floor(Math.random()*fanColors.length)]
                        });
                    }
                }
            }
        }

        class Car {
            constructor(name, teamData, isPlayer, startPosIdx) {
                this.name = name;
                this.team = teamData;
                this.isPlayer = isPlayer;
                this.color = teamData.color;
                
                let wp0 = waypoints[0], wp1 = waypoints[1];
                let angle = Math.atan2(wp1.y - wp0.y, wp1.x - wp0.x);
                
                let offsetX = Math.cos(angle + Math.PI/2) * (startPosIdx % 2 === 0 ? -40 : 40);
                let backOffset = Math.floor(startPosIdx / 2) * 140 + 80; 
                
                this.x = wp0.x + offsetX - Math.cos(angle)*backOffset;
                this.y = wp0.y + offsetX - Math.sin(angle)*backOffset;
                this.angle = angle;
                
                this.speed = 0;
                this.maxSpeed = 16;
                this.accel = isPlayer ? 0.35 : 0.28 + (Math.random()*0.05); 
                this.friction = 0.96;
                this.turnSpeed = 0.11; // ИИ научился лучше рулить
                
                // Целимся в 0 (финишную черту) для правильного старта
                this.targetWp = 0; 
                this.hasStarted = false; 
                this.laps = 0;
                this.distanceToNext = 0;
                this.onTrack = true;
                
                this.boost = 0; 
                this.isBoosting = false;
                
                // Маленький разброс, чтобы ИИ держался центра трассы
                this.aiBaseOffset = (Math.random() - 0.5) * 60; 
                this.finishTime = null;
            }

            update() {
                if (state.racePhase === 'finished' && this.isPlayer) {
                    this.speed *= 0.95; 
                } else if (this.isPlayer) {
                    if (keys['KeyW']) this.speed += this.accel;
                    if (keys['KeyS']) this.speed -= this.accel * 1.5;
                    
                    if (Math.abs(this.speed) > 0.5) {
                        let tSpeed = 0.08 * (Math.abs(this.speed) / this.maxSpeed);
                        if (keys['KeyA']) this.angle -= Math.max(tSpeed, 0.03);
                        if (keys['KeyD']) this.angle += Math.max(tSpeed, 0.03);
                    }

                    if (!this.isBoosting) this.boost = Math.min(100, this.boost + 0.15); 
                    if (keys['Space'] && this.boost >= 100) this.isBoosting = true;
                    
                    if (this.isBoosting) {
                        this.boost -= 1.2;
                        this.speed += 0.6;
                        if (this.boost <= 0) { this.boost = 0; this.isBoosting = false; }
                    }
                } else {
                    // ИДЕАЛЬНЫЙ ИИ
                    if(state.racePhase === 'racing' && !this.finishTime) {
                        let target = waypoints[this.targetWp];
                        let nextTarget = waypoints[(this.targetWp + 1) % waypoints.length];

                        // Плавно убираем разброс при подъезде к точке, чтобы целиться точно в апекс
                        let offsetFactor = Math.min(1, this.distanceToNext / 200);
                        let currentOffset = this.onTrack ? (this.aiBaseOffset * offsetFactor) : 0; 
                        
                        let tAngle = Math.atan2(target.y - this.y, target.x - this.x);
                        let targetX = target.x + Math.cos(tAngle + Math.PI/2) * currentOffset;
                        let targetY = target.y + Math.sin(tAngle + Math.PI/2) * currentOffset;
                        
                        let desiredAngle = Math.atan2(targetY - this.y, targetX - this.x);
                        let aDiff = desiredAngle - this.angle;
                        
                        while (aDiff > Math.PI) aDiff -= Math.PI*2;
                        while (aDiff < -Math.PI) aDiff += Math.PI*2;
                        
                        // ИИ поворачивает очень резко, чтобы не вылетать
                        this.angle += Math.sign(aDiff) * Math.min(Math.abs(aDiff), this.turnSpeed);

                        // ПРЕДВИДЕНИЕ ПОВОРОТА: смотрим, куда идет трасса дальше
                        let nextSegmentAngle = Math.atan2(nextTarget.y - target.y, nextTarget.x - target.x);
                        let nextDiff = nextSegmentAngle - this.angle;
                        while (nextDiff > Math.PI) nextDiff -= Math.PI*2;
                        while (nextDiff < -Math.PI) nextDiff += Math.PI*2;

                        // Если до поворота меньше 350 пикселей, начинаем жестко оттормаживаться
                        let brakeFactor = Math.abs(aDiff) * 1.5;
                        if (this.distanceToNext < 350) {
                            brakeFactor = Math.max(brakeFactor, Math.abs(nextDiff) * 2.0);
                        }
                        
                        let cornerSlowdown = Math.max(0.25, 1 - brakeFactor); 
                        this.speed += this.accel * cornerSlowdown;
                    } else {
                        this.speed *= 0.95; 
                    }
                }

                this.speed *= this.friction;
                let currentMax = this.isBoosting ? this.maxSpeed * 1.4 : this.maxSpeed;
                if (this.speed > currentMax) this.speed = currentMax;
                if (this.speed < -5) this.speed = -5;

                this.onTrack = false;
                for(let i=0; i<waypoints.length; i++) {
                    let p1 = waypoints[i], p2 = waypoints[(i+1)%waypoints.length];
                    if (distToSegment(this.x, this.y, p1.x, p1.y, p2.x, p2.y) < TRACK_WIDTH / 2) {
                        this.onTrack = true; break;
                    }
                }
                if (!this.onTrack) this.speed *= 0.85; 

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                cars.forEach(other => {
                    if (other !== this) {
                        let dx = this.x - other.x;
                        let dy = this.y - other.y;
                        let distSq = dx*dx + dy*dy;
                        if (distSq < 1000 && distSq > 0) { 
                            let dist = Math.sqrt(distSq);
                            let overlap = 32 - dist;
                            this.x += (dx / dist) * overlap * 0.1;
                            this.y += (dy / dist) * overlap * 0.1;
                            this.speed *= 0.99;
                        }
                    }
                });

                let targetWpNode = waypoints[this.targetWp];
                let prev = waypoints[(this.targetWp - 1 + waypoints.length) % waypoints.length];
                
                let trackVx = targetWpNode.x - prev.x;
                let trackVy = targetWpNode.y - prev.y;
                let carVx = targetWpNode.x - this.x;
                let carVy = targetWpNode.y - this.y;
                
                let dot = trackVx * carVx + trackVy * carVy;
                this.distanceToNext = Math.hypot(targetWpNode.x - this.x, targetWpNode.y - this.y);
                
                if (dot <= 0 || this.distanceToNext < TRACK_WIDTH * 0.8) {
                    if (this.targetWp === 0) { 
                        if (!this.hasStarted) {
                            this.hasStarted = true; 
                        } else {
                            this.laps++;
                            checkLapProgress(this);
                        }
                    }
                    this.targetWp = (this.targetWp + 1) % waypoints.length;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(-22, -12, 44, 24);

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.moveTo(25, 0); ctx.lineTo(10, -8); ctx.lineTo(-20, -10); ctx.lineTo(-20, 10); ctx.lineTo(10, 8); ctx.fill();

                ctx.fillStyle = "#111";
                ctx.fillRect(10, -14, 10, 6); ctx.fillRect(10, 8, 10, 6); 
                ctx.fillRect(-18, -16, 12, 8); ctx.fillRect(-18, 8, 12, 8); 
                
                ctx.fillStyle = "#ccc";
                ctx.beginPath(); ctx.arc(-5, 0, 5, 0, Math.PI*2); ctx.fill();

                if (this.isBoosting) {
                    ctx.fillStyle = "#00d2ff";
                    ctx.beginPath(); ctx.arc(-25, 0, 8 + Math.random()*5, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
                
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(this.name.split(' ')[1] || this.name, this.x - 20, this.y - 25);
            }
        }

        function formatTime(ms) {
            ms = Math.floor(ms); 
            let mins = Math.floor(ms / 60000);
            let secs = Math.floor((ms % 60000) / 1000);
            let millis = ms % 1000;
            return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}.${millis.toString().padStart(3,'0')}`;
        }

        let gridOrder = []; 

        function startSession(mode) {
            if(!state.driver || !state.track) {
                alert('Брат, ты не выбрал гонщика или трассу! Вернись назад и выбери.');
                return;
            }
            state.session = mode;
            state.racePhase = 'countdown';
            
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('results-overlay').style.display = 'none';
            
            const tData = tracksConfig.find(t=>t.id===state.track);
            waypoints = tData.points.map(p => ({x: p[0], y: p[1]}));

            generateScenery(); 

            let allDrivers = [];
            for(let key in roster) {
                roster[key].forEach(d => {
                    allDrivers.push({ name: d, team: teams.find(t=>t.id===key) });
                });
            }

            cars = [];
            if (mode === 'quali') {
                let pd = allDrivers.find(d => d.name === state.driver);
                cars.push(new Car(pd.name, pd.team, true, 0));
                document.getElementById('ui-lap').innerText = "Квал: 1/1";
            } else {
                if (gridOrder.length === 0) {
                    let ai = allDrivers.filter(d => d.name !== state.driver);
                    ai.sort(() => Math.random() - 0.5); 
                    gridOrder = ai.map(d=>d.name);
                    gridOrder.push(state.driver); 
                }
                gridOrder.forEach((dName, idx) => {
                    let dData = allDrivers.find(d => d.name === dName);
                    cars.push(new Car(dData.name, dData.team, dName === state.driver, idx));
                });
                document.getElementById('ui-lap').innerText = "Круг: 1/3";
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            checkOrientation();

            let count = 10;
            let overlay = document.getElementById('countdown-overlay');
            let text = document.getElementById('countdown-text');
            overlay.style.display = 'flex';
            text.innerText = count;

            let cInt = setInterval(() => {
                count--;
                if (count > 0) {
                    text.innerText = count;
                } else {
                    clearInterval(cInt);
                    text.innerText = "СТАРТ!";
                    setTimeout(() => { overlay.style.display = 'none'; }, 1000);
                    state.racePhase = 'racing';
                    state.timeParams.start = Date.now();
                }
            }, 1000);

            if(animId) cancelAnimationFrame(animId);
            gameLoop();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            checkOrientation();
        }

        function updateLapUI(car) {
            let maxLaps = state.session === 'quali' ? 1 : 3;
            let displayLap = Math.min(car.laps + 1, maxLaps);
            document.getElementById('ui-lap').innerText = state.session === 'quali' ? `Квал: 1/1` : `Круг: ${displayLap}/${maxLaps}`;
        }

        function checkLapProgress(car) {
            let maxLaps = state.session === 'quali' ? 1 : 3;
            
            if (car.isPlayer) updateLapUI(car);

            if (car.laps >= maxLaps && !car.finishTime) {
                car.finishTime = Date.now() - state.timeParams.start;
                if (car.isPlayer) {
                    state.racePhase = 'finished';
                    checkOrientation(); 
                    setTimeout(showResults, 1500); 
                }
            }
        }

        function updateStandingsUI() {
            let sorted = [...cars].sort((a, b) => {
                if (a.finishTime && b.finishTime) return a.finishTime - b.finishTime;
                if (a.finishTime) return -1;
                if (b.finishTime) return 1;
                
                let wpScoreA = a.targetWp === 0 ? waypoints.length : a.targetWp;
                let wpScoreB = b.targetWp === 0 ? waypoints.length : b.targetWp;
                
                let scoreA = a.laps * 100000 + wpScoreA * 1000 - Math.max(0, a.distanceToNext);
                let scoreB = b.laps * 100000 + wpScoreB * 1000 - Math.max(0, b.distanceToNext);
                return scoreB - scoreA;
            });

            let html = '';
            sorted.forEach((c, idx) => {
                let currentLap = Math.min(3, c.laps + 1);
                let lapStr = (state.session === 'race' && !c.finishTime && c.hasStarted) ? ` (Круг ${currentLap})` : '';
                html += `<div class="standings-row ${c.isPlayer ? 'player' : ''}">
                            <span style="color:${c.color}">${idx+1}. ${c.name.split(' ')[1] || c.name}${lapStr}</span>
                         </div>`;
            });
            document.getElementById('ui-standings').innerHTML = html;
        }

        function showResults() {
            document.getElementById('results-overlay').style.display = 'flex';
            const tbody = document.getElementById('res-table');
            tbody.innerHTML = '';

            if (state.session === 'quali') {
                document.getElementById('res-title').innerText = "КВАЛИФИКАЦИЯ ЗАВЕРШЕНА";
                document.getElementById('btn-next-session').style.display = 'block';
                document.getElementById('btn-to-teams').style.display = 'none';
                
                let playerTime = cars.find(c=>c.isPlayer).finishTime;
                let allResults = [{name: state.driver, time: playerTime}];
                
                let allDrivers = [];
                for(let key in roster) roster[key].forEach(d => allDrivers.push(d));
                let aiDrivers = allDrivers.filter(d => d !== state.driver);
                
                aiDrivers.forEach(d => {
                    let simTime = Math.floor(playerTime + (Math.random() * 8000 - 3000)); 
                    allResults.push({name: d, time: simTime});
                });
                
                allResults.sort((a,b) => a.time - b.time);
                gridOrder = allResults.map(r => r.name); 

                allResults.forEach((r, idx) => {
                    tbody.innerHTML += `<div class="res-row" style="${r.name===state.driver?'color:var(--main-color)':''}">
                        <span>${idx+1}</span><span>${r.name}</span><span>${formatTime(r.time)}</span>
                    </div>`;
                });

            } else {
                document.getElementById('res-title').innerText = "ГОНКА ЗАВЕРШЕНА";
                document.getElementById('btn-next-session').style.display = 'none';
                document.getElementById('btn-to-teams').style.display = 'block';
                
                cars.forEach(c => {
                    if (!c.finishTime) {
                        let missingLaps = 3 - c.laps;
                        c.finishTime = Math.floor(state.timeParams.current + (missingLaps * 15000) + Math.random()*5000);
                    }
                });

                let sorted = [...cars].sort((a,b) => a.finishTime - b.finishTime);

                sorted.forEach((c, idx) => {
                    let tStr = formatTime(c.finishTime);
                    tbody.innerHTML += `<div class="res-row" style="${c.isPlayer?'color:var(--main-color)':''}">
                        <span>${idx+1}</span><span>${c.name}</span><span>${tStr}</span>
                    </div>`;
                });
            }
        }

        function transitionToRace() {
            startSession('race');
        }

        function returnToTeams() {
            gridOrder = [];
            document.getElementById('results-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'none';
            showScreen('team-select');
        }

        function resetGame() {
            gridOrder = [];
            document.getElementById('results-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'none';
            showScreen('main-menu');
        }

        const bindTouch = (id, key) => {
            const btn = document.getElementById(id);
            if(!btn) return;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[key] = false; });
        };
        
        bindTouch('btn-gas', 'KeyW');
        bindTouch('btn-brake', 'KeyS');
        bindTouch('btn-left', 'KeyA');
        bindTouch('btn-right', 'KeyD');
        bindTouch('btn-boost', 'Space');

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function drawTrackDetailed(ctx) {
            trees.forEach(t => {
                ctx.fillStyle = "#1e5128"; 
                ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#27ae60"; 
                ctx.beginPath(); ctx.arc(t.x, t.y, t.r*0.7, 0, Math.PI*2); ctx.fill();
            });

            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(waypoints[0].x, waypoints[0].y);
            for(let i=1; i<waypoints.length; i++) ctx.lineTo(waypoints[i].x, waypoints[i].y);
            ctx.closePath();
            ctx.lineWidth = TRACK_WIDTH + 20;
            ctx.strokeStyle = "#c0392b";
            ctx.setLineDash([40, 40]);
            ctx.stroke();

            ctx.setLineDash([]);
            ctx.lineWidth = TRACK_WIDTH;
            ctx.strokeStyle = "#555";
            ctx.stroke();

            let wp0 = waypoints[0], wp1 = waypoints[1];
            let angle = Math.atan2(wp1.y - wp0.y, wp1.x - wp0.x);
            ctx.save();
            ctx.translate(wp0.x, wp0.y);
            ctx.rotate(angle);
            
            ctx.fillStyle = "white";
            ctx.fillRect(0, -TRACK_WIDTH/2 - 10, 40, TRACK_WIDTH + 20);
            
            ctx.fillStyle = "black";
            for(let i = -TRACK_WIDTH/2 - 10; i <= TRACK_WIDTH/2 + 10; i += 20) {
                ctx.fillRect(0, i, 10, 10);
                ctx.fillRect(10, i+10, 10, 10);
                ctx.fillRect(20, i, 10, 10);
                ctx.fillRect(30, i+10, 10, 10); 
            }
            ctx.restore();

            fansDots.forEach(f => {
                ctx.fillStyle = f.c;
                ctx.beginPath(); ctx.arc(f.x, f.y, 3, 0, Math.PI*2); ctx.fill();
            });
        }

        function gameLoop() {
            let playerCar = cars.find(c => c.isPlayer);

            if (state.racePhase === 'racing') {
                state.timeParams.current = Date.now() - state.timeParams.start;
                document.getElementById('ui-time').innerText = formatTime(state.timeParams.current);
                cars.forEach(c => c.update());
            } else if (state.racePhase === 'finished' || state.racePhase === 'countdown') {
                cars.forEach(c => c.update()); 
            }

            ctx.fillStyle = "#20914c"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width/2 - playerCar.x, canvas.height/2 - playerCar.y);

            drawTrackDetailed(ctx);
            cars.forEach(c => c.draw(ctx));

            ctx.restore();

            updateStandingsUI();
            
            let boostFill = document.getElementById('boost-fill');
            let boostLabel = document.getElementById('boost-label');
            let btnBoost = document.getElementById('btn-boost');

            boostFill.style.width = playerCar.boost + "%";
            if (playerCar.boost >= 100) {
                boostLabel.classList.add('boost-ready');
                boostLabel.innerText = "ГОТОВО! (ПРОБЕЛ / ⚡)";
                btnBoost.classList.add('boost-active-anim');
            } else {
                boostLabel.classList.remove('boost-ready');
                boostLabel.innerText = `УСКОРЕНИЕ (ПРОБЕЛ / ⚡)`;
                btnBoost.classList.remove('boost-active-anim');
            }

            animId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
